<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="position">
    <form class="form js-form">
        <h1 class="form-title">Form</h1>
        <label class="form-label">Name
            <input class="input js-name" type="text" placeholder="Enter your name...">
        </label>
        <label class="form-label">Last name
            <input class="input js-last-name" type="text" placeholder="Enter your last name...">
        </label>
        <label class="form-label">Telephone
            <input class="input js-tel" type="tel" placeholder="Enter your telephone...">
        </label>
        <label class="form-label">Email
            <input class="input js-email" type="email" placeholder="Enter your email...">
        </label>
        <button class="sub-btn">Submit</button>
    </form>
    <div class="info">
        <h2>Your info</h2>
        <h3>Your name</h3>
        <h3>Your lastname</h3>
        <h3>Your email</h3>
        <h3>Your contacts</h3>
        <div class="info-contacts">
            
        </div>
    </div>
    </div>
    <script src="./js/contacts.js" type="module"></script>
</body>
</html>
